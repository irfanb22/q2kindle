<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>q2kindle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f4;
      color: #1a1a1a;
    }

    /* ── Header ── */
    .header {
      background: #2d5f2d;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.01em;
    }

    /* ── Content area ── */
    .content {
      padding: 20px;
    }

    /* ── Login view ── */
    .login-view label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    .login-view p.hint {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #2d5f2d;
    }

    input::placeholder {
      color: #aaa;
    }

    .otp-input {
      letter-spacing: 8px;
      font-size: 20px;
      text-align: center;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2d5f2d;
      color: #fff;
      margin-top: 12px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #245024;
    }

    .btn-secondary {
      background: transparent;
      color: #2d5f2d;
      font-weight: 500;
      font-size: 13px;
      margin-top: 8px;
      padding: 8px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(45, 95, 45, 0.08);
    }

    /* ── OTP view ── */
    .otp-view .check-email {
      font-size: 13px;
      color: #555;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .otp-view .check-email strong {
      color: #1a1a1a;
    }

    .otp-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .otp-actions button {
      width: auto;
      flex: 1;
    }

    /* ── Save view ── */
    .save-view .url-display {
      background: #fff;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .url-display .url-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .url-display .url-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .url-display .url-text {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid #e5e5e5;
      margin-top: 12px;
    }

    .user-bar .user-email {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .user-bar .sign-out {
      font-size: 12px;
      color: #2d5f2d;
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 500;
      padding: 4px 8px;
      width: auto;
      border-radius: 4px;
    }

    .user-bar .sign-out:hover {
      background: rgba(45, 95, 45, 0.08);
    }

    /* ── Status messages ── */
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      margin-top: 12px;
      display: none;
    }

    .status.success {
      background: #e8f5e8;
      color: #2d5f2d;
      border: 1px solid #c8e6c8;
      display: block;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── View management ── */
    .view { display: none; }
    .view.active { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="7" fill="#f4f4f4"/>
      <rect x="8" y="4" width="16" height="24" rx="3" stroke="#2d5f2d" stroke-width="2" fill="none"/>
      <rect x="11" y="8" width="10" height="2.5" rx="1" fill="#2d5f2d"/>
      <rect x="11" y="13" width="10" height="2.5" rx="1" fill="#2d5f2d" opacity="0.65"/>
      <rect x="11" y="18" width="10" height="2.5" rx="1" fill="#2d5f2d" opacity="0.35"/>
    </svg>
    <h1>q2kindle</h1>
  </div>

  <div class="content">
    <!-- Login View -->
    <div id="login-view" class="view login-view active">
      <label for="email-input">Email address</label>
      <p class="hint">Sign in with your q2kindle account to save articles.</p>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
      <button id="send-link-btn" class="btn-primary">Send Magic Link</button>
      <div id="login-status" class="status"></div>
    </div>

    <!-- OTP View -->
    <div id="otp-view" class="view otp-view">
      <p class="check-email">Check your email for a 6-digit code from <strong>q2kindle</strong>.</p>
      <input type="text" id="otp-input" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      <button id="verify-btn" class="btn-primary">Verify Code</button>
      <div class="otp-actions">
        <button id="back-btn" class="btn-secondary">Back</button>
        <button id="resend-btn" class="btn-secondary">Resend Code</button>
      </div>
      <div id="otp-status" class="status"></div>
    </div>

    <!-- Save View -->
    <div id="save-view" class="view save-view">
      <div class="url-display">
        <div class="url-label">Current Page</div>
        <div id="page-title" class="url-title">Loading...</div>
        <div id="page-url" class="url-text"></div>
      </div>
      <button id="save-btn" class="btn-primary">Save to Queue</button>
      <div id="save-status" class="status"></div>
      <div class="user-bar">
        <span id="user-email" class="user-email"></span>
        <button id="sign-out-btn" class="sign-out">Sign out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
